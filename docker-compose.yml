services:
  postgres:
    image: postgres:16-alpine
    container_name: rsmm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rsmm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: rsmm
    ports:
      - "5432:5432"
    volumes:
      - rsmm_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rsmm -d rsmm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  rsmm_pg_data:
