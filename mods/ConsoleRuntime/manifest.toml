[mod]
id          = "ConsoleRuntime"
name        = "In-Game Console Runtime"
version     = "1.0.0"
author      = "rsmm"
description = "File-watched /command dispatcher. Lua reads <game>/mods/_console.txt every tick, executes /commands via rsmm.call, writes results to _console_out.txt."
enabled     = true
load_order  = 0
multiplayer_scope = "local-only"

# Opt-in: when true, ConsoleRuntime additionally registers /eval (run
# arbitrary Lua inside the game process). Off by default. Anyone who
# can write _console.txt gets full code execution when this is on, so
# only flip it for local development.
dev_mode    = false
