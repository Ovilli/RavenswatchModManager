[mod]
id          = "ExampleContentEnemy"
name        = "Example: New Enemy"
version     = "0.2.0"
author      = "RSMM"
description = "Demonstrates [[content]] kind=\"enemy\" by registering a mutated goblin variant. See docs/_re/kinds/enemies.md for the field-offset table."
enabled     = true
sdk_version = ">=3.0,<4"

# Registered via `oIResourceManager::FindOrLoad` slot 3 on
# `oCTLibrary<oCDtEnemyDefinition>` (singleton 0x1414118c0). The Stage-3
# enemy-settings filter (FUN_14030b000) admits this record when the
# request tier sits inside `tier_range` and the tribe matches.
[[content]]
kind         = "enemy"
id           = "Mutated_Goblin"
base         = "Goblin_Default"
name         = "Mutated Goblin"
display_name = "Mutated Goblin"
description  = "A tougher goblin variant with increased stats."
tribe        = "Goblin_Tribe"
tier         = 2
tags         = ["mutant", "tribe_goblin"]
hp           = 250
damage       = 18
