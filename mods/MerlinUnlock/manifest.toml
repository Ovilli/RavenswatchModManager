[mod]
id                = "MerlinUnlock"
name              = "Merlin Unlock"
version           = "0.4.0"
author            = "RSMM"
description       = "Bypass the unlock condition on the Merlin hero so he is always selectable on the hero pick screen."
enabled           = true
load_order        = 50
multiplayer_scope = "cosmetic"
sdk_version       = ">=3.0,<4"

# Runtime Lua hooks (init.lua + pointers.json) — hooks three condition
# subclasses that Merlin's hero definition actually uses:
#   AdditionalContentGameUnlockConditionSettings
#   NamedEventGameLockConditionSettings
#   HeroProgressionUnlockConditionSettings
#
# The orchestrator and base class are deliberately NOT hooked because
# returning 1 from those causes all heroes to break.
#
# Function names are resolved at runtime via the pattern DB so they
# work regardless of ASLR.
#
# Linux/Proton: requires WINEDLLOVERRIDES="winhttp=n,b" in Steam launch
# options so the RSMM winhttp.dll loader is used instead of Wine's built-in.
#
# Example launch options:
#   WINEDLLOVERRIDES="winhttp=n,b" RSMM_ENGINE_TRACE=1 RSMM_BLOCK_STEAM_INVITE=1 %command%
