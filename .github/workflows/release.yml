name: Release desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # MSVC env is required for cmake to pick up cl.exe + linker on
      # windows-latest. dtolnay/rust-toolchain installs Rust but does not
      # arrange the VS dev shell.
      - name: Setup MSVC dev shell (Windows)
        if: matrix.platform == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build loader DLL (Windows)
        if: matrix.platform == 'windows-latest'
        shell: cmd
        continue-on-error: true
        run: |
          call src\loader\build.bat

      - name: Build rsmm sidecar (PyInstaller)
        shell: bash
        run: |
          python -m pip install --upgrade pip pyinstaller
          pip install -e .
          OUT=apps/desktop/src-tauri/binaries
          mkdir -p "$OUT"
          # Keep PyInstaller paths inside the workspace so Windows runners
          # (workspace on D:, system temp on C:) don't hit cross-drive relpath errors.
          PYI_DIST="$PWD/.pyi-build/dist"
          PYI_WORK="$PWD/.pyi-build/work"
          PYI_SPEC="$PWD/.pyi-build"
          mkdir -p "$PYI_DIST" "$PYI_WORK" "$PYI_SPEC"
          # Subcommands are loaded dynamically via importlib, so PyInstaller's
          # static analyzer cannot find them. Use --collect-submodules to walk
          # the rsmm.cli and rsmm.engine packages and pull in every module —
          # this avoids the maintenance burden of an explicit hidden-import
          # list that has to be kept in sync with every new subcommand.
          HIDDEN_IMPORTS=(
            --collect-submodules=rsmm.cli
            --collect-submodules=rsmm.engine
            --collect-submodules=rsmm.sdk
          )
          # PyInstaller's --add-data separator is ':' on Unix, ';' on Windows.
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then SEP=';'; else SEP=':'; fi
          # PyInstaller resolves relative --add-data SRC paths against the
          # --specpath dir, not the cwd. We use a separate spec dir so use
          # absolute paths here to keep the source unambiguous.
          # On git-bash (windows-latest) `$PWD` returns the MSYS-style
          # `/d/a/...` which PyInstaller misreads as `\d\a\...`. Use
          # `pwd -W` to get a real `D:/a/...` Windows path.
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            ROOT="$(pwd -W)"
          else
            ROOT="$PWD"
          fi
          # Bundle every runtime file the CLI reads from the repo tree.
          # The frozen binary resolves REPO_ROOT to _MEIPASS, so anything
          # listed here is reachable at the same relative path it had in
          # source. Skipping any of these makes apply/doctor/install-loader
          # crash on a fresh user install (we hit this in public tests).
          ADD_DATA=(
            --add-data "${ROOT}/pyproject.toml${SEP}."
            --add-data "${ROOT}/data/asset_map.json${SEP}data"
            --add-data "${ROOT}/data/asset_map.csv${SEP}data"
            --add-data "${ROOT}/src/rsmm/cli/install_loader.sh${SEP}src/rsmm/cli"
            --add-data "${ROOT}/src/rsmm/cli/install_loader.ps1${SEP}src/rsmm/cli"
            --add-data "${ROOT}/src/rsmm/cli/install_loader.bat${SEP}src/rsmm/cli"
            --add-data "${ROOT}/src/loader/lua${SEP}src/loader/lua"
          )
          # function_patterns.json is gitignored (regenerable, 20MB) — bundle
          # if present, otherwise the loader DLL will regenerate on first use.
          if [ -f "${ROOT}/data/function_patterns.json" ]; then
            ADD_DATA+=(--add-data "${ROOT}/data/function_patterns.json${SEP}data")
          fi
          # schemas/ + templates/ are optional dev assets — bundle if present.
          if [ -d "${ROOT}/data/schemas" ]; then
            ADD_DATA+=(--add-data "${ROOT}/data/schemas${SEP}data/schemas")
          fi
          if [ -d "${ROOT}/data/templates" ]; then
            ADD_DATA+=(--add-data "${ROOT}/data/templates${SEP}data/templates")
          fi
          # Ship the prebuilt Windows loader DLL when we just built it.
          if [ -f "${ROOT}/dist/winhttp.dll" ]; then
            ADD_DATA+=(--add-data "${ROOT}/dist/winhttp.dll${SEP}dist")
          fi
          if [ "${{ matrix.platform }}" = "macos-latest" ]; then
            pyinstaller --onefile --name rsmm-mac --target-arch universal2 \
              --distpath "$PYI_DIST" --workpath "$PYI_WORK" --specpath "$PYI_SPEC" \
              "${HIDDEN_IMPORTS[@]}" "${ADD_DATA[@]}" \
              ./rsmm
            cp "$PYI_DIST/rsmm-mac" "$OUT/rsmm-aarch64-apple-darwin"
            cp "$PYI_DIST/rsmm-mac" "$OUT/rsmm-x86_64-apple-darwin"
            cp "$PYI_DIST/rsmm-mac" "$OUT/rsmm-universal-apple-darwin"
            chmod +x "$OUT/rsmm-aarch64-apple-darwin" "$OUT/rsmm-x86_64-apple-darwin" "$OUT/rsmm-universal-apple-darwin"
          else
            TRIPLE=$(rustc -vV | sed -n 's/host: //p')
            pyinstaller --onefile --name "rsmm-$TRIPLE" \
              --distpath "$OUT" --workpath "$PYI_WORK" --specpath "$PYI_SPEC" \
              "${HIDDEN_IMPORTS[@]}" "${ADD_DATA[@]}" \
              ./rsmm
          fi
          ls -la "$OUT"

      - name: Install JS deps
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Supply-chain audit
        run: pnpm audit:supply-chain

      - name: Rebuild lifecycle scripts (post-audit)
        run: pnpm rebuild

      - name: Build desktop (Tauri)
        # `tauri-action@v0` produced bundles + `.sig` files locally but
        # actively deleted the sig files before subsequent steps could
        # see them, leaving the updater manifest job with nothing to
        # assemble. Running `pnpm tauri build` directly keeps every
        # artifact on disk for the upload step below.
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        working-directory: apps/desktop
        run: |
          set -euo pipefail
          # `${{ matrix.args }}` is empty on linux/windows and
          # `--target universal-apple-darwin` on macOS. Quote-safe because
          # GH Actions expands it before the shell sees it.
          pnpm tauri build ${{ matrix.args }}

      - name: Ensure draft release exists
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -uo pipefail
          # First matrix leg to reach this step creates the draft; the
          # others find it and reuse via the upload step's `--clobber`.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, reusing."
          else
            extra=""
            if [[ "$TAG" == *-* ]]; then extra="--prerelease"; fi
            gh release create "$TAG" \
              --draft \
              --title "RSMM $TAG" \
              --notes "RSMM $TAG — see commit log for changes." \
              $extra
          fi

      - name: Upload bundles + sigs to draft release
        # Walks the tauri output tree once, grabs every installer +
        # signature, uploads each via `gh release upload --clobber`.
        # No reliance on tauri-action's filtered upload list — `.sig`
        # files come along too, which is the whole point.
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -uo pipefail
          # Bundle artifacts live under any of:
          #   target/release/bundle/{appimage,deb,nsis,msi,...}
          #   target/<triple>/release/bundle/...     (mac universal)
          count=0
          while IFS= read -r -d '' f; do
            count=$((count + 1))
            echo "  uploading $f"
            gh release upload "$TAG" "$f" --clobber || echo "    upload failed for $f"
          done < <(
            find apps/desktop/src-tauri/target -path '*/bundle/*' -type f \
              \( -name '*.AppImage' \
                 -o -name '*.deb' \
                 -o -name '*.dmg' \
                 -o -name '*-setup.exe' \
                 -o -name '*.msi' \
                 -o -name '*.app.tar.gz' \
                 -o -name '*.sig' \) \
              -print0
          )
          echo "Total artifacts uploaded: $count"
          if [ "$count" -eq 0 ]; then
            echo "::error::No bundle artifacts found — tauri build output is empty?"
            exit 1
          fi

  publish-updater-manifest:
    needs: build
    # Only run when the signing private key is configured. The build
    # step skips Tauri's `.sig` generation when no key is set, so
    # trying to assemble `latest.json` afterwards always fails. Skipping
    # the job entirely keeps the release shipping signature-less for
    # users who haven't set up the updater feed yet.
    if: vars.HAS_UPDATER_SIGNING == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Assemble latest.json from release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          version="${TAG#v}"
          pub_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Pull every asset from the draft release for this tag.
          workdir="$(mktemp -d)"
          gh release download "$TAG" --dir "$workdir" --pattern '*' --clobber
          ls -la "$workdir"

          # The Tauri updater consumes one bundle per target platform. We
          # prefer formats that the updater plugin actually knows how to
          # install in place: AppImage on Linux, NSIS (-setup.exe) on
          # Windows, and the signed .app.tar.gz on macOS.
          find_artifact () {
            local pattern="$1"
            (cd "$workdir" && ls $pattern 2>/dev/null | head -n1) || true
          }

          linux_bundle="$(find_artifact '*.AppImage')"
          linux_sig_file="$(find_artifact '*.AppImage.sig')"
          win_bundle="$(find_artifact '*-setup.exe')"
          win_sig_file="$(find_artifact '*-setup.exe.sig')"
          if [ -z "$win_bundle" ]; then
            win_bundle="$(find_artifact '*_x64_en-US.msi')"
            win_sig_file="$(find_artifact '*_x64_en-US.msi.sig')"
          fi
          mac_bundle="$(find_artifact '*.app.tar.gz')"
          mac_sig_file="$(find_artifact '*.app.tar.gz.sig')"

          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          encode_url () { python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1]))' "$1"; }

          read_sig () {
            local f="$1"
            if [ -n "$f" ] && [ -f "$workdir/$f" ]; then cat "$workdir/$f"; fi
          }

          linux_sig="$(read_sig "$linux_sig_file")"
          win_sig="$(read_sig "$win_sig_file")"
          mac_sig="$(read_sig "$mac_sig_file")"

          python3 - "$version" "$pub_date" "$base" \
            "$linux_bundle" "$linux_sig" \
            "$win_bundle" "$win_sig" \
            "$mac_bundle" "$mac_sig" <<'PY' > latest.json
          import json, sys, urllib.parse
          (_, version, pub_date, base,
           linux_b, linux_s,
           win_b, win_s,
           mac_b, mac_s) = sys.argv

          def entry(bundle, sig):
              if not bundle or not sig:
                  return None
              return {
                  "signature": sig.strip(),
                  "url": f"{base}/{urllib.parse.quote(bundle)}",
              }

          platforms = {}
          # Tauri's updater key naming: "<os>-<arch>". We publish a single
          # arch per platform today; revisit if/when we ship arm64 Windows
          # or a Linux arm64 bundle.
          if (e := entry(linux_b, linux_s)) is not None:
              platforms["linux-x86_64"] = e
          if (e := entry(win_b, win_s)) is not None:
              platforms["windows-x86_64"] = e
          if (e := entry(mac_b, mac_s)) is not None:
              # Universal macOS binary serves both Intel and Apple Silicon.
              platforms["darwin-x86_64"] = e
              platforms["darwin-aarch64"] = e

          out = {
              "version": version,
              "notes": f"RSMM {version} — see release notes on GitHub.",
              "pub_date": pub_date,
              "platforms": platforms,
          }
          print(json.dumps(out, indent=2))
          PY

          cat latest.json
          if [ "$(python3 -c 'import json,sys;print(len(json.load(open(sys.argv[1]))["platforms"]))' latest.json)" = "0" ]; then
            echo "::error::No signed bundles found in release; refusing to upload empty latest.json"
            exit 1
          fi

          gh release upload "$TAG" latest.json --clobber

  finalize-release:
    # Flips the draft created by tauri-action into a published release
    # once the build matrix (and the updater manifest job, if it ran)
    # is done. Runs unconditionally — `if: always()` covers the case
    # where publish-updater-manifest skipped because signing isn't set
    # up yet. Without this step every release stays as a draft.
    needs: [build, publish-updater-manifest]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release edit "$TAG" --draft=false
