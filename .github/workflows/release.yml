name: Release desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build rsmm sidecar (PyInstaller)
        shell: bash
        run: |
          python -m pip install --upgrade pip pyinstaller
          pip install -e .
          OUT=apps/desktop/src-tauri/binaries
          mkdir -p "$OUT"
          if [ "${{ matrix.platform }}" = "macos-latest" ]; then
            pyinstaller --onefile --name rsmm-mac --target-arch universal2 \
              --distpath /tmp/pyi-dist --workpath /tmp/pyi --specpath /tmp \
              ./rsmm
            cp /tmp/pyi-dist/rsmm-mac "$OUT/rsmm-aarch64-apple-darwin"
            cp /tmp/pyi-dist/rsmm-mac "$OUT/rsmm-x86_64-apple-darwin"
            chmod +x "$OUT/rsmm-aarch64-apple-darwin" "$OUT/rsmm-x86_64-apple-darwin"
          else
            TRIPLE=$(rustc -vV | sed -n 's/host: //p')
            pyinstaller --onefile --name "rsmm-$TRIPLE" \
              --distpath "$OUT" --workpath /tmp/pyi --specpath /tmp \
              ./rsmm
          fi
          ls -la "$OUT"

      - name: Install JS deps
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Supply-chain audit
        run: pnpm audit:supply-chain

      - name: Rebuild lifecycle scripts (post-audit)
        run: pnpm rebuild

      - name: Build desktop
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'RSMM ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}
