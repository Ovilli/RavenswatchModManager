name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: python ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS is in the matrix because the codebase has darwin-specific
        # branches (src/rsmm/engine/paths.py, src/rsmm/cli/run.py) and
        # tests/test_platform_paths.py exercises them — without a macOS
        # runner those branches only run in production on a user's machine.
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      # Match the Python version used by .github/workflows/release.yml
      # (3.12), so any test that passes here also passes in the frozen
      # PyInstaller bundle CI ships to users.
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev deps
        run: python -m pip install --upgrade pip pytest ruff

      - name: ruff
        run: ruff check src/ tests/

      - name: pytest
        run: python -m pytest -q

  ts:
    name: typescript (biome + tsc + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Supply-chain audit (lockfile vs known-bad versions)
        run: pnpm audit:supply-chain

      - name: Rebuild lifecycle scripts (post-audit)
        run: pnpm rebuild

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm check-types

      - name: Test
        run: pnpm test

  loader-linux-mingw:
    name: loader (mingw-w64 cross-compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mingw-w64 + cmake
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 cmake build-essential

      - name: Build loader DLL
        run: bash src/loader/build.sh

      - name: Upload winhttp.dll
        uses: actions/upload-artifact@v4
        with:
          name: winhttp-dll
          path: dist/winhttp.dll
          if-no-files-found: error
