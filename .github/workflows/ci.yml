name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: python ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev deps
        run: python -m pip install --upgrade pip pytest ruff

      - name: ruff
        run: ruff check src/ tests/

      - name: pytest
        run: python -m pytest -q

  loader-linux-mingw:
    name: loader (mingw-w64 cross-compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mingw-w64 + cmake
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 cmake build-essential

      - name: Build loader DLL
        run: bash src/loader/build.sh

      - name: Upload winhttp.dll
        uses: actions/upload-artifact@v4
        with:
          name: winhttp-dll
          path: dist/winhttp.dll
          if-no-files-found: error
