# Fires when a release is published from the GitHub UI (or API with a PAT).
# Automated publishes from release.yml use GITHUB_TOKEN and do NOT trigger
# `release: published` (GitHub blocks workflow→workflow loops). Those runs
# call scripts/discord-release-notify.sh from the finalize-release job instead.
name: Discord release notification

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send Discord webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          PRERELEASE: ${{ github.event.release.prerelease }}
          REPO: ${{ github.repository }}
        run: bash scripts/discord-release-notify.sh
