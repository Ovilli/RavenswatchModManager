<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300">
  <defs>
    <!-- RSMM theme colors -->
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#621A20" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#170707" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#170707"/>
    </radialGradient>
    <radialGradient id="vignetteTL" cx="0%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#621A20" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#170707" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignetteBR" cx="100%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#882029" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#170707" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4A84B" stop-opacity="0"/>
      <stop offset="25%" stop-color="#D4A84B" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#EBE1BC" stop-opacity="0.5"/>
      <stop offset="75%" stop-color="#D4A84B" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D4A84B" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EBE1BC"/>
      <stop offset="50%" stop-color="#EBE1BC"/>
      <stop offset="100%" stop-color="#D4A84B"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#D4A84B" flood-opacity="0.3"/>
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#621A20" flood-opacity="0.2"/>
    </filter>
    <pattern id="hatch" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#EBE1BC" stroke-width="0.3" stroke-opacity="0.03"/>
    </pattern>
  </defs>

  <!-- BG layers -->
  <rect width="600" height="300" fill="#170707"/>
  <rect width="600" height="300" fill="url(#bgGlow)"/>
  <rect width="600" height="300" fill="url(#vignetteTL)"/>
  <rect width="600" height="300" fill="url(#vignetteBR)"/>
  <rect width="600" height="300" fill="url(#hatch)"/>

  <!-- Border -->
  <rect x="1" y="1" width="598" height="298" fill="none" stroke="#621A20" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="4" y="4" width="592" height="292" fill="none" stroke="#D4A84B" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- Corner ornaments (gilt/gold) -->
  <g opacity="0.2" stroke="#D4A84B" stroke-width="1.2" fill="none">
    <path d="M10,28 L28,10"/><path d="M10,38 L38,10"/>
    <path d="M590,28 L572,10"/><path d="M590,38 L562,10"/>
    <path d="M10,272 L28,290"/><path d="M10,262 L38,290"/>
    <path d="M590,272 L572,290"/><path d="M590,262 L562,290"/>
  </g>

  <!-- Top accent line -->
  <rect x="50" y="12" width="500" height="1" rx="0.5" fill="url(#accentLine)"/>

  <!-- Fleuron on accent line -->
  <g transform="translate(300, 12)" fill="#D4A84B" opacity="0.3">
    <circle cx="-4" cy="0" r="0.8"/><circle cx="0" cy="0" r="0.8"/><circle cx="4" cy="0" r="0.8"/>
  </g>

  <!-- Gear left -->
  <g transform="translate(55, 80)" opacity="0.12">
    <g fill="#D4A84B">
      <rect x="16" y="-3" width="7" height="6" rx="1" transform="rotate(0)"/>
      <rect x="16" y="-3" width="7" height="6" rx="1" transform="rotate(30)"/>
      <rect x="16" y="-3" width="7" height="6" rx="1" transform="rotate(60)"/>
      <rect x="16" y="-3" width="7" height="6" rx="1" transform="rotate(90)"/>
      <rect x="16" y="-3" width="7" height="6" rx="1" transform="rotate(120)"/>
      <rect x="16" y="-3" width="7" height="6" rx="1" transform="rotate(150)"/>
      <rect x="16" y="-3" width="7" height="6" rx="1" transform="rotate(180)"/>
      <rect x="16" y="-3" width="7" height="6" rx="1" transform="rotate(210)"/>
      <rect x="16" y="-3" width="7" height="6" rx="1" transform="rotate(240)"/>
      <rect x="16" y="-3" width="7" height="6" rx="1" transform="rotate(270)"/>
      <rect x="16" y="-3" width="7" height="6" rx="1" transform="rotate(300)"/>
      <rect x="16" y="-3" width="7" height="6" rx="1" transform="rotate(330)"/>
    </g>
    <circle cx="0" cy="0" r="16" fill="none" stroke="#D4A84B" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#D4A84B" stroke-width="1"/>
    <circle cx="0" cy="0" r="2.5" fill="#D4A84B"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#D4A84B" stroke-width="1"/>
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#D4A84B" stroke-width="1"/>
  </g>

  <!-- Gear right -->
  <g transform="translate(545, 225)" opacity="0.1">
    <g fill="#EBE1BC">
      <rect x="12" y="-2.5" width="5" height="5" rx="1" transform="rotate(0)"/>
      <rect x="12" y="-2.5" width="5" height="5" rx="1" transform="rotate(45)"/>
      <rect x="12" y="-2.5" width="5" height="5" rx="1" transform="rotate(90)"/>
      <rect x="12" y="-2.5" width="5" height="5" rx="1" transform="rotate(135)"/>
      <rect x="12" y="-2.5" width="5" height="5" rx="1" transform="rotate(180)"/>
      <rect x="12" y="-2.5" width="5" height="5" rx="1" transform="rotate(225)"/>
      <rect x="12" y="-2.5" width="5" height="5" rx="1" transform="rotate(270)"/>
      <rect x="12" y="-2.5" width="5" height="5" rx="1" transform="rotate(315)"/>
    </g>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#EBE1BC" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="2" fill="#EBE1BC"/>
  </g>

  <!-- Gear top-right small -->
  <g transform="translate(548, 52)" opacity="0.08">
    <g fill="#D4A84B">
      <rect x="10" y="-2" width="4" height="4" rx="1" transform="rotate(0)"/>
      <rect x="10" y="-2" width="4" height="4" rx="1" transform="rotate(60)"/>
      <rect x="10" y="-2" width="4" height="4" rx="1" transform="rotate(120)"/>
      <rect x="10" y="-2" width="4" height="4" rx="1" transform="rotate(180)"/>
      <rect x="10" y="-2" width="4" height="4" rx="1" transform="rotate(240)"/>
      <rect x="10" y="-2" width="4" height="4" rx="1" transform="rotate(300)"/>
    </g>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#D4A84B" stroke-width="1"/>
    <circle cx="0" cy="0" r="2" fill="#D4A84B"/>
  </g>

  <!-- Raven -->
  <g transform="translate(300, 70)">
    <!-- Tail feathers -->
    <path d="M-4,18 L-16,40 L-8,36 L-2,20" fill="none" stroke="#EBE1BC" stroke-width="1" opacity="0.3"/>
    <path d="M0,18 L-8,44 L-2,40 L2,22" fill="none" stroke="#EBE1BC" stroke-width="0.8" opacity="0.25"/>
    <path d="M4,18 L2,44 L6,40 L6,20" fill="none" stroke="#EBE1BC" stroke-width="0.6" opacity="0.2"/>
    <!-- Body -->
    <path d="M-10,8 C-16,14 -18,24 -12,30 C-8,34 0,36 4,36 C8,36 16,34 20,30 C26,24 24,14 18,8 C14,4 8,2 4,2 C0,2 -6,4 -10,8Z" fill="#170707" stroke="#EBE1BC" stroke-width="1.2" opacity="0.85"/>
    <!-- Wing left -->
    <path d="M-6,10 C-14,8 -22,2 -28,4 C-32,6 -24,14 -18,16 C-14,17 -10,15 -6,12" fill="#170707" stroke="#D4A84B" stroke-width="0.8" opacity="0.6"/>
    <!-- Wing right -->
    <path d="M14,10 C22,8 30,2 36,4 C40,6 32,14 26,16 C22,17 18,15 14,12" fill="#170707" stroke="#D4A84B" stroke-width="0.8" opacity="0.6"/>
    <!-- Head -->
    <path d="M-4,-4 C-4,-10 2,-18 6,-18 C10,-18 12,-12 10,-6 C8,-2 0,-2 -4,-4Z" fill="#170707" stroke="#EBE1BC" stroke-width="1.2" opacity="0.9"/>
    <!-- Eye -->
    <circle cx="2" cy="-11" r="2" fill="#D4A84B"/>
    <circle cx="2" cy="-11" r="0.8" fill="#EBE1BC"/>
    <!-- Beak -->
    <path d="M8,-12 L18,-10 L8,-8" fill="none" stroke="#D4A84B" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- Crown feathers -->
    <path d="M-2,-16 L0,-22 L2,-18 L4,-24 L6,-16" fill="none" stroke="#EBE1BC" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- "RAVENSWATCH MOD MANAGER" subtitle -->
  <text x="300" y="125" text-anchor="middle" fill="#846B61" font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="6" text-transform="uppercase">RAVENSWATCH MOD MANAGER</text>

  <!-- "UPDATE" in Fraktur-style -->
  <text x="300" y="210" text-anchor="middle" fill="url(#titleGrad)" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="bold" letter-spacing="10" filter="url(#glow)">UPDATE</text>

  <!-- Badge -->
  <g transform="translate(300, 240)">
    <rect x="-54" y="-11" width="108" height="22" rx="11" fill="#621A20" fill-opacity="0.4" stroke="#D4A84B" stroke-width="0.6" stroke-opacity="0.3"/>
    <text x="0" y="5" text-anchor="middle" fill="#D4A84B" font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="3">NEW RELEASE</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="60" y="278" width="480" height="1" rx="0.5" fill="url(#accentLine)"/>

  <!-- Stars -->
  <g fill="#EBE1BC" opacity="0.08">
    <circle cx="30" cy="140" r="1"/><circle cx="570" cy="140" r="1"/>
    <circle cx="28" cy="100" r="0.5"/><circle cx="572" cy="100" r="0.5"/>
    <circle cx="35" cy="200" r="0.7"/><circle cx="565" cy="200" r="0.7"/>
    <circle cx="80" cy="55" r="0.4"/><circle cx="520" cy="55" r="0.4"/>
    <circle cx="90" cy="250" r="0.4"/><circle cx="510" cy="250" r="0.4"/>
  </g>
</svg>
